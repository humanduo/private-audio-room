services:
  private-audio-room:
    build: .
    container_name: private-audio-room
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      PORT: "8787"
      AUDIO_ROOT: /media/audio
      # Optional. Set this after your Cloudflare Tunnel domain is ready.
      PUBLIC_APP_URL: https://audio.307167312.xyz
      # Fill this in your deployment environment. Do not commit a real key.
      OPENAI_API_KEY: ""
      OPENAI_IMAGE_MODEL: gpt-image-1
      AUTO_GENERATE_COVERS: "false"
      MAX_AUTO_GENERATED_COVERS_PER_SCAN: "8"
    volumes:
      # On UGREEN NAS, change the left side to your audio folder, for example:
      # - /Audio:/media/audio:ro
      - ./media/audio:/media/audio:ro
      # App settings, categories, scan results, and covers saved as data URLs.
      - ./data:/app/data
